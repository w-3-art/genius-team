<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessibility Checker — Genius Team</title>
    <link rel="stylesheet" href="./design-tokens.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .btn {
            background: var(--accent-purple);
            color: var(--text-inverse);
            border: none;
            padding: 7px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .main { padding: 24px; max-width: 1200px; margin: 0 auto; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
        }
        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        /* Overall score */
        .score-row { display: flex; align-items: center; gap: 24px; }
        .wcag-level {
            font-size: 28px;
            font-weight: 800;
            padding: 8px 20px;
            border-radius: 8px;
            letter-spacing: 2px;
        }
        .level-a { background: var(--tone-red-15); color: var(--accent-red); }
        .level-aa { background: var(--tone-orange-15); color: var(--accent-orange); }
        .level-aaa { background: var(--tone-green-15); color: var(--accent-green); }
        /* Contrast checker */
        .contrast-row { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
        .color-picker-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .color-picker-wrap label { font-size: 11px; color: var(--text-secondary); }
        input[type="color"] { width: 52px; height: 52px; border-radius: 8px; border: 2px solid var(--border-color); cursor: pointer; padding: 2px; background: none; }
        .contrast-preview {
            flex: 1;
            height: 64px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        .contrast-results { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .contrast-badge {
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
        }
        .contrast-badge .ratio { font-size: 18px; font-weight: 800; display: block; margin-bottom: 4px; }
        .pass { background: var(--tone-green-15); color: var(--accent-green); border: 1px solid var(--tone-green-30); }
        .fail { background: var(--tone-red-15); color: var(--accent-red); border: 1px solid var(--tone-red-30); }
        /* WCAG checklist */
        .category-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-purple);
            padding: 12px 0 8px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 2px;
        }
        .criterion-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .criterion-row:last-child { border-bottom: none; }
        .criterion-toggle {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
        }
        .status-btn {
            width: 26px;
            height: 26px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            opacity: 0.5;
        }
        .status-btn.active { opacity: 1; }
        .status-pass.active { background: var(--tone-green-20); border-color: var(--accent-green); }
        .status-warn.active { background: var(--tone-orange-20); border-color: var(--accent-orange); }
        .status-fail.active { background: var(--tone-red-20); border-color: var(--accent-red); }
        .criterion-text { flex: 1; }
        .criterion-name { font-size: 13px; font-weight: 500; }
        .criterion-desc { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--accent-green); color: var(--text-inverse);
            padding: 10px 18px; border-radius: 8px;
            font-size: 13px; opacity: 0; transform: translateY(10px);
            transition: all 0.3s; pointer-events: none; z-index: 999;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
<div class="header">
    <h1>♿ WCAG 2.2 Accessibility Checker</h1>
    <button class="btn" onclick="exportReport()">Export Report</button>
</div>

<div class="main">
    <div class="grid-2">
        <!-- Overall Score -->
        <div class="card">
            <div class="card-title">Overall WCAG Score</div>
            <div class="score-row">
                <svg width="90" height="90" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="40" fill="none" stroke="var(--bg-tertiary)" stroke-width="10"/>
                    <circle cx="50" cy="50" r="40" fill="none" stroke="var(--accent-orange)" stroke-width="10"
                        id="scoreCircle" stroke-dasharray="251.3" stroke-dashoffset="125.65"
                        stroke-linecap="round" transform="rotate(-90 50 50)"/>
                    <text x="50" y="54" text-anchor="middle" fill="var(--text-primary)" font-size="18" font-weight="700" id="scoreText">50</text>
                </svg>
                <div>
                    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:6px">WCAG Level</div>
                    <div class="wcag-level level-aa" id="wcagLevel">AA</div>
                    <div style="font-size:12px;color:var(--text-secondary);margin-top:8px">Based on checklist</div>
                </div>
                <div style="flex:1">
                    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px">Passing: <span id="passingCount" style="color:var(--accent-green)">0</span></div>
                    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px">Warnings: <span id="warnCount" style="color:var(--accent-orange)">0</span></div>
                    <div style="font-size:12px;color:var(--text-secondary)">Failing: <span id="failCount" style="color:var(--accent-red)">0</span></div>
                </div>
            </div>
        </div>

        <!-- Color Contrast -->
        <div class="card">
            <div class="card-title">🎨 Color Contrast Checker</div>
            <div class="contrast-row">
                <div class="color-picker-wrap">
                    <label>Foreground</label>
                    <input type="color" id="fgColor" value="#e6edf3" oninput="calcContrast()">
                </div>
                <div class="color-picker-wrap">
                    <label>Background</label>
                    <input type="color" id="bgColor" value="#0d1117" oninput="calcContrast()">
                </div>
                <div class="contrast-preview" id="contrastPreview" style="color:#e6edf3;background:#0d1117">
                    Sample Text
                </div>
            </div>
            <div class="contrast-results">
                <div class="contrast-badge pass" id="badgeRatio">
                    <span class="ratio" id="ratioVal">12.6</span>
                    Contrast ratio
                </div>
                <div class="contrast-badge pass" id="badgeAA">
                    <span class="ratio">✅</span>
                    AA Pass
                </div>
                <div class="contrast-badge pass" id="badgeAAA">
                    <span class="ratio">✅</span>
                    AAA Pass
                </div>
            </div>
        </div>
    </div>

    <!-- WCAG Checklist -->
    <div class="card">
        <div class="card-title">WCAG 2.2 AA Checklist (20 criteria)</div>
        <div id="checklistBody"></div>
    </div>
</div>

<div class="toast" id="toast">✅ Report exported!</div>

<script>
    const criteria = [
        { cat: '👁️ Perceivable', items: [
            { id: '1.1.1', name: 'Non-text Content', desc: 'All images have meaningful alt text' },
            { id: '1.3.1', name: 'Info and Relationships', desc: 'Structure conveyed through semantic HTML' },
            { id: '1.3.4', name: 'Orientation', desc: 'Content not restricted to a single orientation' },
            { id: '1.4.1', name: 'Use of Color', desc: 'Color is not the only visual means to convey information' },
            { id: '1.4.3', name: 'Contrast (Minimum)', desc: 'Text has at least 4.5:1 contrast ratio' },
        ]},
        { cat: '🖱️ Operable', items: [
            { id: '2.1.1', name: 'Keyboard', desc: 'All functionality available from keyboard' },
            { id: '2.1.2', name: 'No Keyboard Trap', desc: 'Keyboard focus is never trapped' },
            { id: '2.3.1', name: 'Three Flashes', desc: 'No content flashes more than 3 times/sec' },
            { id: '2.4.1', name: 'Bypass Blocks', desc: 'Skip navigation or landmark regions present' },
            { id: '2.4.3', name: 'Focus Order', desc: 'Focus order preserves meaning and operability' },
            { id: '2.4.7', name: 'Focus Visible', desc: 'Keyboard focus indicator is visible' },
        ]},
        { cat: '🧠 Understandable', items: [
            { id: '3.1.1', name: 'Language of Page', desc: 'HTML lang attribute is set correctly' },
            { id: '3.2.1', name: 'On Focus', desc: 'No unexpected context change on focus' },
            { id: '3.2.2', name: 'On Input', desc: 'No unexpected context change on input' },
            { id: '3.3.1', name: 'Error Identification', desc: 'Errors described in text' },
            { id: '3.3.2', name: 'Labels or Instructions', desc: 'Form inputs have visible labels' },
        ]},
        { cat: '🔧 Robust', items: [
            { id: '4.1.1', name: 'Parsing', desc: 'HTML is valid with unique IDs' },
            { id: '4.1.2', name: 'Name, Role, Value', desc: 'All UI components have accessible names' },
            { id: '4.1.3', name: 'Status Messages', desc: 'Status messages announced to assistive tech' },
            { id: '1.4.11', name: 'Non-text Contrast', desc: 'UI components have 3:1 contrast minimum' },
        ]}
    ];

    const statusMap = {}; // id -> 'pass'|'warn'|'fail'|null

    function renderChecklist() {
        const body = document.getElementById('checklistBody');
        body.innerHTML = criteria.map(cat => `
            <div class="category-title">${cat.cat}</div>
            ${cat.items.map(item => `
                <div class="criterion-row">
                    <div class="criterion-toggle">
                        <button class="status-btn status-pass ${statusMap[item.id]==='pass'?'active':''}" title="Pass" onclick="setStatus('${item.id}','pass',this)">✅</button>
                        <button class="status-btn status-warn ${statusMap[item.id]==='warn'?'active':''}" title="Warning" onclick="setStatus('${item.id}','warn',this)">⚠️</button>
                        <button class="status-btn status-fail ${statusMap[item.id]==='fail'?'active':''}" title="Fail" onclick="setStatus('${item.id}','fail',this)">❌</button>
                    </div>
                    <div class="criterion-text">
                        <div class="criterion-name">${item.id} — ${item.name}</div>
                        <div class="criterion-desc">${item.desc}</div>
                    </div>
                </div>
            `).join('')}
        `).join('');
    }

    function setStatus(id, status, btn) {
        if (statusMap[id] === status) {
            delete statusMap[id];
        } else {
            statusMap[id] = status;
        }
        renderChecklist();
        updateScore();
    }

    function updateScore() {
        const vals = Object.values(statusMap);
        const pass = vals.filter(v => v === 'pass').length;
        const warn = vals.filter(v => v === 'warn').length;
        const fail = vals.filter(v => v === 'fail').length;
        const total = 20;
        const score = Math.round((pass * 1 + warn * 0.5) / total * 100);

        document.getElementById('passingCount').textContent = pass;
        document.getElementById('warnCount').textContent = warn;
        document.getElementById('failCount').textContent = fail;
        document.getElementById('scoreText').textContent = score;

        const offset = 251.3 * (1 - score / 100);
        document.getElementById('scoreCircle').setAttribute('stroke-dashoffset', offset);
        const color = score >= 85 ? 'var(--accent-green)' : score >= 60 ? 'var(--accent-orange)' : 'var(--accent-red)';
        document.getElementById('scoreCircle').setAttribute('stroke', color);

        const levelEl = document.getElementById('wcagLevel');
        if (score >= 90) { levelEl.textContent = 'AAA'; levelEl.className = 'wcag-level level-aaa'; }
        else if (score >= 65) { levelEl.textContent = 'AA'; levelEl.className = 'wcag-level level-aa'; }
        else { levelEl.textContent = 'A'; levelEl.className = 'wcag-level level-a'; }
    }

    // Contrast calculation
    function getLuminance(hex) {
        const r = parseInt(hex.slice(1,3),16)/255;
        const g = parseInt(hex.slice(3,5),16)/255;
        const b = parseInt(hex.slice(5,7),16)/255;
        const toLinear = c => c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4);
        return 0.2126*toLinear(r) + 0.7152*toLinear(g) + 0.0722*toLinear(b);
    }

    function calcContrast() {
        const fg = document.getElementById('fgColor').value;
        const bg = document.getElementById('bgColor').value;
        document.getElementById('contrastPreview').style.color = fg;
        document.getElementById('contrastPreview').style.background = bg;

        const l1 = getLuminance(fg);
        const l2 = getLuminance(bg);
        const ratio = (Math.max(l1,l2) + 0.05) / (Math.min(l1,l2) + 0.05);
        const r = Math.round(ratio * 10) / 10;

        document.getElementById('ratioVal').textContent = r + ':1';
        document.getElementById('badgeAA').innerHTML = ratio >= 4.5
            ? '<span class="ratio">✅</span>AA Pass (4.5:1)'
            : '<span class="ratio">❌</span>AA Fail';
        document.getElementById('badgeAA').className = 'contrast-badge ' + (ratio >= 4.5 ? 'pass' : 'fail');
        document.getElementById('badgeAAA').innerHTML = ratio >= 7
            ? '<span class="ratio">✅</span>AAA Pass (7:1)'
            : '<span class="ratio">❌</span>AAA Fail';
        document.getElementById('badgeAAA').className = 'contrast-badge ' + (ratio >= 7 ? 'pass' : 'fail');
    }

    function exportReport() {
        const lines = ['# WCAG 2.2 Accessibility Audit Report', '', `Generated: ${new Date().toLocaleString()}`, ''];
        criteria.forEach(cat => {
            lines.push('## ' + cat.cat);
            cat.items.forEach(item => {
                const s = statusMap[item.id];
                const icon = s === 'pass' ? '✅' : s === 'warn' ? '⚠️' : s === 'fail' ? '❌' : '⬜';
                lines.push(`- ${icon} **${item.id} ${item.name}** — ${item.desc}`);
            });
            lines.push('');
        });
        const score = document.getElementById('scoreText').textContent;
        const level = document.getElementById('wcagLevel').textContent;
        lines.push(`## Summary`);
        lines.push(`- Score: ${score}/100`);
        lines.push(`- Level: WCAG ${level}`);
        lines.push(`- Passing: ${document.getElementById('passingCount').textContent}`);
        lines.push(`- Warnings: ${document.getElementById('warnCount').textContent}`);
        lines.push(`- Failing: ${document.getElementById('failCount').textContent}`);

        const blob = new Blob([lines.join('\n')], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'wcag-audit.md'; a.click();
        URL.revokeObjectURL(url);
        showToast('📥 Report exported!');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    renderChecklist();
    calcContrast();
</script>
</body>
</html>
