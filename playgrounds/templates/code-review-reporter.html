<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Review Reporter — Genius Team</title>
    <link rel="stylesheet" href="./design-tokens.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .btn {
            background: var(--accent-purple);
            color: var(--text-inverse);
            border: none;
            padding: 7px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-sm {
            padding: 4px 10px;
            font-size: 11px;
        }
        .main { padding: 24px; max-width: 1300px; margin: 0 auto; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 20px; }
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
        }
        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .pr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .pr-field label { font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
        .field-input {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 7px 10px;
            border-radius: 6px;
            font-size: 13px;
        }
        .field-input:focus { outline: none; border-color: var(--accent-purple); }
        /* Severity buckets */
        .bucket-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            user-select: none;
        }
        .bucket-critical { background: var(--tone-red-10); border-left: 3px solid var(--accent-red); }
        .bucket-high { background: var(--tone-orange-10); border-left: 3px solid var(--accent-orange); }
        .bucket-medium { background: var(--tone-blue-10); border-left: 3px solid var(--accent-blue); }
        .bucket-low { background: var(--tone-green-10); border-left: 3px solid var(--accent-green); }
        .bucket-label { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .bucket-count {
            font-size: 20px;
            font-weight: 800;
        }
        .finding-item {
            background: var(--bg-tertiary);
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 6px;
            font-size: 13px;
            border: 1px solid var(--border-color);
        }
        .finding-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }
        .file-badge {
            background: var(--bg-secondary);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            color: var(--accent-cyan);
        }
        .line-badge {
            font-size: 11px;
            color: var(--text-secondary);
        }
        .agent-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }
        .agent-bugs { background: var(--tone-red-10); color: var(--accent-red); }
        .agent-security { background: var(--tone-purple-10); color: var(--accent-purple); }
        .agent-quality { background: var(--tone-cyan-10); color: var(--accent-cyan); }
        .finding-desc { font-size: 12px; color: var(--text-secondary); }
        .finding-delete { background: none; border: none; color: var(--accent-red); cursor: pointer; font-size: 14px; margin-left: auto; }
        /* Summary */
        .recommendation {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .rec-approve { background: var(--tone-green-15); color: var(--accent-green); border: 1px solid var(--tone-green-30); }
        .rec-changes { background: var(--tone-orange-15); color: var(--accent-orange); border: 1px solid var(--tone-orange-30); }
        .rec-block { background: var(--tone-red-15); color: var(--accent-red); border: 1px solid var(--tone-red-30); }
        /* Agent cards */
        .agent-card { text-align: center; padding: 16px; }
        .agent-icon { font-size: 28px; margin-bottom: 6px; }
        .agent-name { font-size: 12px; color: var(--text-secondary); }
        .agent-count { font-size: 24px; font-weight: 800; }
        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: var(--overlay-black-60);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            width: 480px;
            max-width: 90vw;
        }
        .modal h3 { font-size: 15px; margin-bottom: 16px; }
        .modal label { font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 4px; margin-top: 10px; }
        .modal select {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 7px 10px;
            border-radius: 6px;
            font-size: 13px;
        }
        .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--accent-green); color: var(--text-inverse);
            padding: 10px 18px; border-radius: 8px;
            font-size: 13px; opacity: 0; transform: translateY(10px);
            transition: all 0.3s; pointer-events: none; z-index: 999;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="header">
    <h1>🔍 Code Review Reporter</h1>
    <button class="btn" onclick="copyReviewComment()">📋 Copy Review Comment</button>
</div>

<div class="main">
    <!-- PR Info -->
    <div class="card" style="margin-bottom:20px">
        <div class="card-title">📌 Pull Request Info</div>
        <div class="pr-grid">
            <div class="pr-field">
                <label>PR Title</label>
                <input type="text" class="field-input" id="prTitle" value="feat: add user authentication flow" oninput="updateSummary()">
            </div>
            <div class="pr-field">
                <label>Branch</label>
                <input type="text" class="field-input" id="prBranch" value="feat/auth-flow">
            </div>
            <div class="pr-field">
                <label>Author</label>
                <input type="text" class="field-input" id="prAuthor" value="@dev-team">
            </div>
            <div class="pr-field">
                <label>Files Changed</label>
                <input type="number" class="field-input" id="prFiles" value="14" oninput="updateSummary()">
            </div>
        </div>
    </div>

    <!-- Findings -->
    <div class="grid-2">
        <div>
            <div id="bucket-CRITICAL" class="card" style="margin-bottom:16px">
                <div class="bucket-header bucket-critical" onclick="toggleBucket('CRITICAL')">
                    <span class="bucket-label">🔴 CRITICAL</span>
                    <span class="bucket-count" style="color:var(--accent-red)" id="count-CRITICAL">0</span>
                </div>
                <div id="items-CRITICAL"></div>
                <button class="btn btn-sm" style="width:100%;margin-top:4px;background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-primary)" onclick="openAddModal('CRITICAL')">+ Add finding</button>
            </div>
            <div id="bucket-HIGH" class="card" style="margin-bottom:16px">
                <div class="bucket-header bucket-high" onclick="toggleBucket('HIGH')">
                    <span class="bucket-label">🟠 HIGH</span>
                    <span class="bucket-count" style="color:var(--accent-orange)" id="count-HIGH">0</span>
                </div>
                <div id="items-HIGH"></div>
                <button class="btn btn-sm" style="width:100%;margin-top:4px;background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-primary)" onclick="openAddModal('HIGH')">+ Add finding</button>
            </div>
        </div>
        <div>
            <div id="bucket-MEDIUM" class="card" style="margin-bottom:16px">
                <div class="bucket-header bucket-medium" onclick="toggleBucket('MEDIUM')">
                    <span class="bucket-label">🔵 MEDIUM</span>
                    <span class="bucket-count" style="color:var(--accent-blue)" id="count-MEDIUM">0</span>
                </div>
                <div id="items-MEDIUM"></div>
                <button class="btn btn-sm" style="width:100%;margin-top:4px;background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-primary)" onclick="openAddModal('MEDIUM')">+ Add finding</button>
            </div>
            <div id="bucket-LOW" class="card">
                <div class="bucket-header bucket-low" onclick="toggleBucket('LOW')">
                    <span class="bucket-label">🟢 LOW</span>
                    <span class="bucket-count" style="color:var(--accent-green)" id="count-LOW">0</span>
                </div>
                <div id="items-LOW"></div>
                <button class="btn btn-sm" style="width:100%;margin-top:4px;background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-primary)" onclick="openAddModal('LOW')">+ Add finding</button>
            </div>
        </div>
    </div>

    <!-- Summary + Agents -->
    <div class="grid-2">
        <div class="card">
            <div class="card-title">📊 Summary</div>
            <div id="recommendation" class="recommendation rec-approve">✅ APPROVE</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                <div style="font-size:13px;padding:8px 0;border-bottom:1px solid var(--border-color)">Total findings <span id="totalFindings" style="float:right;font-weight:700">0</span></div>
                <div style="font-size:13px;padding:8px 0;border-bottom:1px solid var(--border-color)">Files changed <span id="filesCount" style="float:right;font-weight:700">14</span></div>
                <div style="font-size:13px;padding:8px 0;border-bottom:1px solid var(--border-color)">Critical <span id="s-CRITICAL" style="float:right;font-weight:700;color:var(--accent-red)">0</span></div>
                <div style="font-size:13px;padding:8px 0;border-bottom:1px solid var(--border-color)">High <span id="s-HIGH" style="float:right;font-weight:700;color:var(--accent-orange)">0</span></div>
                <div style="font-size:13px;padding:8px 0">Medium <span id="s-MEDIUM" style="float:right;font-weight:700;color:var(--accent-blue)">0</span></div>
                <div style="font-size:13px;padding:8px 0">Low <span id="s-LOW" style="float:right;font-weight:700;color:var(--accent-green)">0</span></div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">🤖 Agent Breakdown</div>
            <div class="grid-4" style="margin:0">
                <div class="card agent-card" style="padding:14px">
                    <div class="agent-icon">🐛</div>
                    <div class="agent-count" id="agent-bugs" style="color:var(--accent-red)">0</div>
                    <div class="agent-name">Bugs Finder</div>
                </div>
                <div class="card agent-card" style="padding:14px">
                    <div class="agent-icon">🔒</div>
                    <div class="agent-count" id="agent-security" style="color:var(--accent-purple)">0</div>
                    <div class="agent-name">Security</div>
                </div>
                <div class="card agent-card" style="padding:14px">
                    <div class="agent-icon">✨</div>
                    <div class="agent-count" id="agent-quality" style="color:var(--accent-cyan)">0</div>
                    <div class="agent-name">Code Quality</div>
                </div>
                <div class="card agent-card" style="padding:14px">
                    <div class="agent-icon">📋</div>
                    <div class="agent-count" id="agent-other" style="color:var(--text-secondary)">0</div>
                    <div class="agent-name">Other</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Finding Modal -->
<div class="modal-overlay hidden" id="addModal">
    <div class="modal">
        <h3 id="modalTitle">Add Finding</h3>
        <label>File</label>
        <input type="text" class="field-input" id="newFile" placeholder="src/auth/login.js">
        <label>Line</label>
        <input type="number" class="field-input" id="newLine" placeholder="42">
        <label>Description</label>
        <input type="text" class="field-input" id="newDesc" placeholder="Describe the issue...">
        <label>Agent</label>
        <select id="newAgent" style="width:100%;background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-primary);padding:7px 10px;border-radius:6px;font-size:13px">
            <option value="bugs">🐛 Bugs Finder</option>
            <option value="security">🔒 Security</option>
            <option value="quality">✨ Code Quality</option>
            <option value="other">📋 Other</option>
        </select>
        <div class="modal-btns">
            <button class="btn" style="background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-primary)" onclick="closeModal()">Cancel</button>
            <button class="btn" onclick="submitFinding()">Add Finding</button>
        </div>
    </div>
</div>

<div class="toast" id="toast">✅ Copied!</div>

<script>
    const findings = { CRITICAL: [], HIGH: [], MEDIUM: [], LOW: [] };
    let currentSeverity = 'MEDIUM';

    // Seed some sample data
    function seedData() {
        findings.CRITICAL.push({ file: 'src/auth/login.js', line: 87, desc: 'SQL injection vulnerability in login query — user input not sanitized', agent: 'security' });
        findings.HIGH.push({ file: 'src/auth/session.js', line: 23, desc: 'Session token not invalidated on logout', agent: 'security' });
        findings.HIGH.push({ file: 'src/api/user.js', line: 145, desc: 'Missing rate limiting on password reset endpoint', agent: 'bugs' });
        findings.MEDIUM.push({ file: 'src/components/Form.jsx', line: 67, desc: 'useEffect missing dependency array — potential infinite re-render', agent: 'bugs' });
        findings.MEDIUM.push({ file: 'src/utils/hash.js', line: 12, desc: 'MD5 used for password hashing — use bcrypt instead', agent: 'security' });
        findings.LOW.push({ file: 'src/styles/auth.css', line: 4, desc: 'Unused CSS class .login-wrapper-old', agent: 'quality' });
        renderAll();
    }

    function renderAll() {
        ['CRITICAL','HIGH','MEDIUM','LOW'].forEach(sev => renderBucket(sev));
        updateSummary();
    }

    function renderBucket(sev) {
        const container = document.getElementById('items-' + sev);
        container.innerHTML = findings[sev].map((f, i) => `
            <div class="finding-item">
                <div class="finding-meta">
                    <span class="file-badge">${f.file}</span>
                    <span class="line-badge">L${f.line}</span>
                    <span class="agent-badge agent-${f.agent}">${agentLabel(f.agent)}</span>
                    <button class="finding-delete" onclick="deleteFinding('${sev}',${i})">×</button>
                </div>
                <div class="finding-desc">${f.desc}</div>
            </div>
        `).join('');
        document.getElementById('count-' + sev).textContent = findings[sev].length;
    }

    function agentLabel(a) { return {bugs:'🐛 Bugs',security:'🔒 Security',quality:'✨ Quality',other:'📋 Other'}[a] || a; }

    function deleteFinding(sev, i) {
        findings[sev].splice(i, 1);
        renderAll();
    }

    function toggleBucket(sev) {
        // Just visual hint, already expanded
    }

    function updateSummary() {
        const counts = { CRITICAL: findings.CRITICAL.length, HIGH: findings.HIGH.length, MEDIUM: findings.MEDIUM.length, LOW: findings.LOW.length };
        const total = Object.values(counts).reduce((a,b) => a+b, 0);
        document.getElementById('totalFindings').textContent = total;
        document.getElementById('filesCount').textContent = document.getElementById('prFiles').value;
        ['CRITICAL','HIGH','MEDIUM','LOW'].forEach(s => document.getElementById('s-' + s).textContent = counts[s]);

        // Recommendation
        const rec = document.getElementById('recommendation');
        if (counts.CRITICAL > 0) { rec.textContent = '🚫 BLOCK'; rec.className = 'recommendation rec-block'; }
        else if (counts.HIGH > 0) { rec.textContent = '🔄 REQUEST CHANGES'; rec.className = 'recommendation rec-changes'; }
        else { rec.textContent = '✅ APPROVE'; rec.className = 'recommendation rec-approve'; }

        // Agent breakdown
        const all = [...findings.CRITICAL, ...findings.HIGH, ...findings.MEDIUM, ...findings.LOW];
        ['bugs','security','quality','other'].forEach(a => {
            document.getElementById('agent-' + a).textContent = all.filter(f => f.agent === a).length;
        });
    }

    function openAddModal(sev) {
        currentSeverity = sev;
        document.getElementById('modalTitle').textContent = `Add ${sev} Finding`;
        document.getElementById('newFile').value = '';
        document.getElementById('newLine').value = '';
        document.getElementById('newDesc').value = '';
        document.getElementById('addModal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('addModal').classList.add('hidden');
    }

    function submitFinding() {
        const file = document.getElementById('newFile').value || 'unknown.js';
        const line = parseInt(document.getElementById('newLine').value) || 1;
        const desc = document.getElementById('newDesc').value || 'Finding description';
        const agent = document.getElementById('newAgent').value;
        findings[currentSeverity].push({ file, line, desc, agent });
        renderAll();
        closeModal();
    }

    function copyReviewComment() {
        const title = document.getElementById('prTitle').value;
        const author = document.getElementById('prAuthor').value;
        const branch = document.getElementById('prBranch').value;
        const files = document.getElementById('prFiles').value;
        const all = [...findings.CRITICAL,...findings.HIGH,...findings.MEDIUM,...findings.LOW];
        const total = all.length;
        const rec = document.getElementById('recommendation').textContent;

        let comment = `## 🔍 Code Review Report\n\n`;
        comment += `**PR:** ${title}\n**Branch:** \`${branch}\` | **Author:** ${author} | **Files changed:** ${files}\n\n`;
        comment += `### Recommendation: ${rec}\n\n`;
        comment += `| Severity | Count |\n|----------|-------|\n`;
        ['CRITICAL','HIGH','MEDIUM','LOW'].forEach(s => {
            comment += `| ${s} | ${findings[s].length} |\n`;
        });
        comment += `\n**Total findings:** ${total}\n\n`;

        ['CRITICAL','HIGH','MEDIUM','LOW'].forEach(sev => {
            if (findings[sev].length > 0) {
                comment += `### 🔍 ${sev} Findings\n\n`;
                findings[sev].forEach(f => {
                    comment += `- **\`${f.file}\` L${f.line}** (${agentLabel(f.agent)}): ${f.desc}\n`;
                });
                comment += '\n';
            }
        });
        comment += `---\n*Generated by Genius Team Code Review Reporter* 🤖`;

        navigator.clipboard.writeText(comment).then(() => showToast('📋 Review comment copied!'));
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    seedData();
</script>
</body>
</html>
