<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-label="Genius Team logo">
  <title>Genius Team</title>
  <!-- Constellation: central builder + 4 peripheral team nodes connected by fine lines -->
  <line x1="24" y1="24" x2="24" y2="8"/>
  <line x1="24" y1="24" x2="40" y2="24"/>
  <line x1="24" y1="24" x2="24" y2="40"/>
  <line x1="24" y1="24" x2="8" y2="24"/>
  <line x1="24" y1="24" x2="35.3" y2="12.7"/>
  <line x1="24" y1="24" x2="35.3" y2="35.3"/>
  <line x1="24" y1="24" x2="12.7" y2="35.3"/>
  <line x1="24" y1="24" x2="12.7" y2="12.7"/>
  <!-- Peripheral nodes -->
  <circle cx="24" cy="8" r="1.8" fill="#D4A574" stroke="none"/>
  <circle cx="40" cy="24" r="1.8" fill="#D4A574" stroke="none"/>
  <circle cx="24" cy="40" r="1.8" fill="#D4A574" stroke="none"/>
  <circle cx="8" cy="24" r="1.8" fill="#D4A574" stroke="none"/>
  <circle cx="35.3" cy="12.7" r="1.3" fill="#D4A574" stroke="none" opacity="0.6"/>
  <circle cx="35.3" cy="35.3" r="1.3" fill="#D4A574" stroke="none" opacity="0.6"/>
  <circle cx="12.7" cy="35.3" r="1.3" fill="#D4A574" stroke="none" opacity="0.6"/>
  <circle cx="12.7" cy="12.7" r="1.3" fill="#D4A574" stroke="none" opacity="0.6"/>
  <!-- Central focus: the builder (you) -->
  <circle cx="24" cy="24" r="3.2" fill="#0F0F0F" stroke="#D4A574" stroke-width="1.8"/>
</svg>
