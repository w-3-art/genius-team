<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 56" fill="none" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-label="Genius ecosystem — three marks arranged in trinity">
  <title>Genius Ecosystem — Team · Cortex · Revius</title>

  <!-- Genius Team (left): constellation -->
  <g transform="translate(0,4) scale(1)">
    <line x1="24" y1="24" x2="24" y2="10"/>
    <line x1="24" y1="24" x2="38" y2="24"/>
    <line x1="24" y1="24" x2="24" y2="38"/>
    <line x1="24" y1="24" x2="10" y2="24"/>
    <line x1="24" y1="24" x2="34" y2="14"/>
    <line x1="24" y1="24" x2="34" y2="34"/>
    <line x1="24" y1="24" x2="14" y2="34"/>
    <line x1="24" y1="24" x2="14" y2="14"/>
    <circle cx="24" cy="10" r="1.6" fill="#D4A574" stroke="none"/>
    <circle cx="38" cy="24" r="1.6" fill="#D4A574" stroke="none"/>
    <circle cx="24" cy="38" r="1.6" fill="#D4A574" stroke="none"/>
    <circle cx="10" cy="24" r="1.6" fill="#D4A574" stroke="none"/>
    <circle cx="34" cy="14" r="1.1" fill="#D4A574" stroke="none" opacity="0.6"/>
    <circle cx="34" cy="34" r="1.1" fill="#D4A574" stroke="none" opacity="0.6"/>
    <circle cx="14" cy="34" r="1.1" fill="#D4A574" stroke="none" opacity="0.6"/>
    <circle cx="14" cy="14" r="1.1" fill="#D4A574" stroke="none" opacity="0.6"/>
    <circle cx="24" cy="24" r="2.8" fill="#0F0F0F" stroke="#D4A574" stroke-width="1.8"/>
  </g>

  <!-- Cortex (middle): nested hexagons -->
  <g transform="translate(56,4) scale(1)">
    <path d="M 24 6 L 38 14 L 38 32 L 24 40 L 10 32 L 10 14 Z"/>
    <path d="M 24 13 L 32 17.5 L 32 28.5 L 24 33 L 16 28.5 L 16 17.5 Z" opacity="0.55"/>
    <path d="M 24 19 L 28 21.5 L 28 26.5 L 24 29 L 20 26.5 L 20 21.5 Z" opacity="0.3"/>
    <circle cx="24" cy="24" r="1.5" fill="#D4A574" stroke="none"/>
  </g>

  <!-- Revius (right): viewfinder + eye -->
  <g transform="translate(112,4) scale(1)">
    <path d="M 10 14 L 10 10 L 14 10"/>
    <path d="M 34 10 L 38 10 L 38 14"/>
    <path d="M 38 34 L 38 38 L 34 38"/>
    <path d="M 14 38 L 10 38 L 10 34"/>
    <path d="M 14 24 C 17.5 19, 30.5 19, 34 24 C 30.5 29, 17.5 29, 14 24 Z"/>
    <circle cx="24" cy="24" r="3.8" opacity="0.55"/>
    <circle cx="24" cy="24" r="1.8" fill="#D4A574" stroke="none"/>
    <circle cx="25.3" cy="22.6" r="0.6" fill="#0F0F0F" stroke="none"/>
  </g>

  <!-- Subtle connectors between the 3 marks: the ecosystem thread -->
  <line x1="48" y1="28" x2="56" y2="28" opacity="0.35"/>
  <line x1="104" y1="28" x2="112" y2="28" opacity="0.35"/>
</svg>
